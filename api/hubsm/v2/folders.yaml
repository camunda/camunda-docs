# Folder resource paths and schemas
paths:
  /folders:
    post:
      operationId: createFolder
      summary: Create a folder
      description: Creates a new folder in the specified project and/or parent folder.
      x-added-in-version: "0.1.0"
      x-semantic-provider:
        - folderKey
      tags:
        - Folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderCreateRequest"
      responses:
        "200":
          description: The folder was created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResult"
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"

  /folders/{folderKey}:
    get:
      operationId: getFolder
      summary: Get a folder
      description: Returns the folder metadata and its content (child folders and files).
      x-added-in-version: "0.1.0"
      x-semantic-requires:
        kind: Folder
        bind:
          folderKey:
            from: path
            name: folderKey
      tags:
        - Folder
      parameters:
        - $ref: "#/components/parameters/FolderKeyPathParam"
      responses:
        "200":
          description: The folder was retrieved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderDetailResult"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common-responses.yaml#/components/responses/NotFound"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"

    patch:
      operationId: updateFolder
      summary: Update a folder
      description: Updates the name and/or location of an existing folder.
      x-added-in-version: "0.1.0"
      x-semantic-requires:
        kind: Folder
        bind:
          folderKey:
            from: path
            name: folderKey
      tags:
        - Folder
      parameters:
        - $ref: "#/components/parameters/FolderKeyPathParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderUpdateRequest"
      responses:
        "200":
          description: The folder was updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FolderResult"
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common-responses.yaml#/components/responses/NotFound"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"

    delete:
      operationId: deleteFolder
      summary: Delete a folder
      description: >-
        Soft-deletes the folder with the given folder key. The folder is moved to
        the recently deleted state and can be recovered during the retention
        window. The folder must have no files in the folder or any of its
        descendants. To permanently and irreversibly remove a folder, use
        `DELETE /folders/{folderKey}/permanent` instead.
      x-added-in-version: "0.1.0"
      x-semantic-requires:
        kind: Folder
        bind:
          folderKey:
            from: path
            name: folderKey
      tags:
        - Folder
      parameters:
        - $ref: "#/components/parameters/FolderKeyPathParam"
      responses:
        "204":
          description: The folder was deleted successfully.
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common-responses.yaml#/components/responses/NotFound"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"

  /folders/{folderKey}/permanent:
    delete:
      operationId: permanentlyDeleteFolder
      summary: Permanently delete a folder
      description: >-
        Permanently and irreversibly removes the folder with the given folder
        key. The folder cannot be recovered afterwards. The folder must have no
        files in the folder or any of its descendants. This works in one step and
        does not require the folder to be soft-deleted first.
      x-added-in-version: "0.1.0"
      tags:
        - Folder
      parameters:
        - $ref: "#/components/parameters/FolderKeyPathParam"
      responses:
        "204":
          description: The folder was permanently deleted successfully.
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "404":
          description: The folder was not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"

components:
  parameters:
    FolderKeyPathParam:
      name: folderKey
      in: path
      required: true
      description: The unique key identifying the folder.
      schema:
        $ref: "keys.yaml#/components/schemas/FolderKey"

  schemas:
    # --- Request schemas ---

    FolderCreateRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - projectKey
      example:
        name: "processes"
        projectKey: "prj-def-456"
      properties:
        name:
          description: The name of the folder.
          type: string
          minLength: 1
          maxLength: 255
        projectKey:
          description: The key of the project this folder belongs to.
          allOf:
            - $ref: "keys.yaml#/components/schemas/ProjectKey"
        parentFolderKey:
          description: >
            The key of the parent folder. If omitted or null, the folder is created at project root.
          nullable: true
          allOf:
            - $ref: "keys.yaml#/components/schemas/FolderKey"

    FolderUpdateRequest:
      type: object
      additionalProperties: false
      example:
        name: "archived-processes"
        parentFolderKey: "fld-parent-999"
      properties:
        name:
          description: The updated name of the folder.
          type: string
          minLength: 1
          maxLength: 255
        projectKey:
          description: The project to move the folder to.
          allOf:
            - $ref: "keys.yaml#/components/schemas/ProjectKey"
        parentFolderKey:
          description: >
            The updated parent folder key. Set to null to move to project root.
            Cannot be the same as the folder being updated.
          nullable: true
          allOf:
            - $ref: "keys.yaml#/components/schemas/FolderKey"

    # --- Response schemas ---

    FolderResult:
      type: object
      example:
        folderKey: "fld-012-ghi"
        name: "processes"
        projectKey: "prj-def-456"
        parentFolderKey: "fld-parent-001"
        created: "2025-03-15T10:30:00.000Z"
        createdBy:
          name: "Jane Doe"
          email: "jane.doe@example.com"
        updated: "2025-06-10T14:22:00.000Z"
        updatedBy:
          name: "Jane Doe"
          email: "jane.doe@example.com"
      required:
        - folderKey
        - name
        - projectKey
        - parentFolderKey
        - created
        - createdBy
        - updated
        - updatedBy
      properties:
        folderKey:
          description: The unique key identifying this folder.
          allOf:
            - $ref: "keys.yaml#/components/schemas/FolderKey"
        name:
          description: The name of the folder.
          type: string
        projectKey:
          description: The key of the project this folder belongs to.
          allOf:
            - $ref: "keys.yaml#/components/schemas/ProjectKey"
        parentFolderKey:
          description: The key of the parent folder. Null if the folder is at project root.
          nullable: true
          allOf:
            - $ref: "keys.yaml#/components/schemas/FolderKey"
        created:
          description: The timestamp when the folder was created.
          type: string
          format: date-time
        createdBy:
          description: The user who created the folder.
          allOf:
            - $ref: "files.yaml#/components/schemas/UserReference"
        updated:
          description: The timestamp when the folder was last updated.
          type: string
          format: date-time
        updatedBy:
          description: The user who last updated the folder.
          allOf:
            - $ref: "files.yaml#/components/schemas/UserReference"

    FolderDetailResult:
      type: object
      description: A folder with its metadata and content (child folders and files).
      example:
        folder:
          folderKey: "fld-012-ghi"
          name: "processes"
          projectKey: "prj-def-456"
          parentFolderKey: "fld-parent-001"
          created: "2025-03-15T10:30:00.000Z"
          createdBy:
            name: "Jane Doe"
            email: "jane.doe@example.com"
          updated: "2025-06-10T14:22:00.000Z"
          updatedBy:
            name: "Jane Doe"
            email: "jane.doe@example.com"
        content:
          folders:
            - folderKey: "fld-child-001"
              name: "sub-processes"
              projectKey: "prj-def-456"
              parentFolderKey: "fld-012-ghi"
              created: "2025-04-01T08:00:00.000Z"
              createdBy:
                name: "Jane Doe"
                email: "jane.doe@example.com"
              updated: "2025-04-01T08:00:00.000Z"
              updatedBy:
                name: "Jane Doe"
                email: "jane.doe@example.com"
          files:
            - fileKey: "file-789-xyz"
              name: "order-process.bpmn"
              projectKey: "prj-def-456"
              folderKey: "fld-012-ghi"
              simplePath: "/processes/order-process.bpmn"
              canonicalPath: "/fld-012-ghi/file-789-xyz"
              revision: 3
              type: "bpmn"
              content: "<?xml version='1.0' encoding='UTF-8'?>..."
              created: "2025-03-15T10:30:00.000Z"
              createdBy:
                name: "Jane Doe"
                email: "jane.doe@example.com"
              updated: "2025-06-10T14:22:00.000Z"
              updatedBy:
                name: "Jane Doe"
                email: "jane.doe@example.com"
      required:
        - folder
        - content
      properties:
        folder:
          description: The folder metadata.
          allOf:
            - $ref: "#/components/schemas/FolderResult"
        content:
          description: The content of the folder (child folders and files).
          allOf:
            - $ref: "#/components/schemas/FolderContent"

    FolderContent:
      type: object
      description: The content of a folder, listing its direct children.
      required:
        - folders
        - files
      properties:
        folders:
          description: The child folders within this folder.
          type: array
          items:
            $ref: "#/components/schemas/FolderResult"
        files:
          description: The files within this folder.
          type: array
          items:
            $ref: "files.yaml#/components/schemas/FileResult"
