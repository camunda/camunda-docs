openapi: 3.0.3
info:
  title: Hub Public API V2
  description: API for communicating with Camunda Hub.
  version: 0.1.0
  contact:
    name: Camunda
    url: https://camunda.com

servers:
  - url: "{schema}://{host}:{port}/api/v2"
    variables:
      host:
        default: localhost
        description: The hostname of the Hub API server.
      port:
        default: "8088"
        description: The port of the Hub API server.
      schema:
        default: http
        description: The schema of the Hub API server.

security:
  - bearerAuth: []

tags:
  - name: File
    description: File management operations.
  - name: Folder
    description: Folder management operations.
  - name: Project
    description: Project management operations.

paths:
  /files:
    $ref: "files.yaml#/paths/~1files"
  /files/{fileKey}:
    $ref: "files.yaml#/paths/~1files~1{fileKey}"
  /files/search:
    $ref: "files.yaml#/paths/~1files~1search"
  /folders:
    $ref: "folders.yaml#/paths/~1folders"
  /folders/{folderKey}:
    $ref: "folders.yaml#/paths/~1folders~1{folderKey}"
  /projects:
    $ref: "projects.yaml#/paths/~1projects"
  /projects/{projectKey}:
    $ref: "projects.yaml#/paths/~1projects~1{projectKey}"
  /projects/search:
    $ref: "projects.yaml#/paths/~1projects~1search"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from the authorization server.
