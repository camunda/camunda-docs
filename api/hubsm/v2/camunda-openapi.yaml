components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        A JWT access token obtained from your identity provider.
        For SaaS, use the OAuth 2.0 client-credentials flow with the
        client ID and secret created in Camunda Console.
        For Self-Managed, authenticate via your configured OIDC provider
        (e.g., Keycloak, Entra ID).
