openapi: 3.0.3
info:
  title: Hub API
  description: |
    The Hub API lets you manage workspaces, projects, files, folders,
    versions, and members in Camunda Hub programmatically.

    ## Authentication

    All endpoints require a valid JWT bearer token. Obtain a token from your
    identity provider:

    - **SaaS** — create API client credentials in the Camunda Console and
      exchange them for a token via the OAuth 2.0 client-credentials flow.
    - **Self-Managed** — authenticate against your configured OIDC provider
      (Keycloak, Entra ID, or another OpenID Connect-compatible IdP).

    Include the token in every request:
    ```
    Authorization: Bearer <your-token>
    ```

    ## Errors

    Error responses use the RFC 9457 Problem Detail format with
    `Content-Type: application/problem+json`. See the `ProblemDetail` schema
    for the standard fields.

    ## Pagination

    Search endpoints accept a `page` object with `from` (offset) and `limit`
    to control result windowing. Responses include a `page` object with
    `totalItems`.

    ## Rate limits

    The Hub API does not currently enforce per-client rate limits. Clients
    should implement reasonable back-off and retry strategies to handle
    transient errors (HTTP 429 or 503).

    ## V1 deprecation

    The V1 API (`/api/v1/`) is deprecated as of 8.10 and will be removed in
    8.12. Migrate to V2 at your earliest convenience — see the
    [migration guide](https://docs.camunda.io/docs/next/apis-tools/migration-manuals/migrate-from-web-modeler-to-hub-api/)
    for details.
  version: 2.0.0
  contact:
    name: Camunda
    url: https://docs.camunda.io
  license:
    name: Camunda License 1.0
    url: https://legal.camunda.com/licensing-and-other-legal-terms#702a69c4-3932-47b3-ac74-3b557feeda58

servers:
  - url: "{schema}://{host}:{port}/api/v2"
    variables:
      host:
        default: localhost
        description: The hostname of the Hub API server.
      port:
        default: "8070"
        description: The port of the Hub API server.
      schema:
        default: http
        description: The schema of the Hub API server.

security:
  - bearerAuth: []

tags:
  - name: Catalog
    description: Catalog asset management operations.
  - name: Cluster
    description: Cluster registration operations.
  - name: File
    description: File management operations.
  - name: Folder
    description: Folder management operations.
  - name: Info
    description: API metadata operations.
  - name: Project
    description: Project management operations.
  - name: Version
    description: Version management operations.
  - name: Workspace
    description: Workspace management operations.
  - name: Member
    description: Member management operations.

