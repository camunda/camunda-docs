    delete:
      tags:
        - User
      operationId: deleteUser
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Delete user
      description: |-


        [[ADDED_IN_VERSION:8.8]]

        [[REQUIRED_PERMISSIONS:eyJwZXJtaXNzaW9ucyI6W3sicmVzb3VyY2VUeXBlIjoiVVNFUiIsInBlcm1pc3Npb25UeXBlIjoiREVMRVRFIn1dfQ]]

        [[CONSISTENCY:STRONG]]

        Deletes a user.
      parameters:
        - name: username
          in: path
          required: true
          description: The username of the user to delete.
          schema:
            $ref: "identifiers.yaml#/components/schemas/Username"
      responses:
        "204":
          description: The user was deleted successfully.
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "404":
          description: The user is not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
