  /users/{username}:
    get:
      tags:
        - User
      operationId: getUser
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Get user
      description: |-


        [[ADDED_IN_VERSION:8.8]]

        [[REQUIRED_PERMISSIONS:eyJwZXJtaXNzaW9ucyI6W3sicmVzb3VyY2VUeXBlIjoiVVNFUiIsInBlcm1pc3Npb25UeXBlIjoiUkVBRCJ9XX0]]

        [[CONSISTENCY:EVENTUAL]]

        Get a user by its username.
      parameters:
        - name: username
          in: path
          required: true
          description: The username of the user.
          schema:
            $ref: "identifiers.yaml#/components/schemas/Username"
      responses:
        "200":
          description: The user is successfully returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResult"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
