          $ref: "common-responses.yaml#/components/responses/InternalServerError"
        "503":
          $ref: "common-responses.yaml#/components/responses/ServiceUnavailable"
      x-added-in-version: "8.8"
components:
  schemas:
    UserRequest:
      type: object
      properties:
        password:
          description: The password of the user.
          type: string
        username:
          description: The username of the new user.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/Username"
        name:
          description: The name of the user.
          type: string
        email:
          description: The email of the user.
          type: string
      required:
        - username
        - password
    UserCreateResult:
      type: object
      properties:
        username:
          description: The username of the created user.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/Username"
        name:
          description: The name of the user.
          nullable: true
          type: string
        email:
          description: The email of the user.
          nullable: true
          type: string
      required:
        - username
        - name
        - email
    UserUpdateRequest:
      type: object
      properties:
        password:
          description: The password of the user. If blank, the password is unchanged.
          type: string
        name:
          description: The name of the user.
          type: string
        email:
          description: The email of the user.
          type: string
    UserUpdateResult:
      type: object
      properties:
        username:
          description: The username of the updated user.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/Username"
        name:
          description: The name of the user.
          nullable: true
          type: string
        email:
          description: The email of the user.
          nullable: true
          type: string
      required:
        - username
        - name
        - email
    UserResult:
      type: object
      properties:
        username:
          description: The username of the user.
          allOf:
            - $ref: "identifiers.yaml#/components/schemas/Username"
        name:
          description: The name of the user.
          nullable: true
          type: string
        email:
          description: The email of the user.
          nullable: true
          type: string
      required:
        - username
        - name
        - email
    UserSearchQuerySortRequest:
      type: object
      properties:
        field:
          description: The field to sort by.
          type: string
          enum:
            - username
            - name
            - email
        order:
          $ref: "search-models.yaml#/components/schemas/SortOrderEnum"
      required:
        - field
    UserSearchQueryRequest:
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryRequest"
      type: object
      properties:
        sort:
          description: Sort field criteria.
          type: array
          items:
            $ref: "#/components/schemas/UserSearchQuerySortRequest"
        filter:
          allOf:
            - $ref: "#/components/schemas/UserFilter"
          description: The user search filters.
    UserFilter:
      description: User search filter.
      type: object
      properties:
        username:
          description: The username of the user.
          allOf:
            - $ref: "filters.yaml#/components/schemas/StringFilterProperty"
        name:
          description: The name of the user.
          allOf:
            - $ref: "filters.yaml#/components/schemas/StringFilterProperty"
        email:
          description: The email of the user.
          allOf:
            - $ref: "filters.yaml#/components/schemas/StringFilterProperty"
    UserSearchResult:
      type: object
      allOf:
        - $ref: "search-models.yaml#/components/schemas/SearchQueryResponse"
      required:
        - items
      properties:
        items:
          description: The matching users.
          type: array
          items:
            $ref: "#/components/schemas/UserResult"
