paths:
  /forms/{formKey}:
    get:
      tags:
        - Form
      operationId: getFormByKey
      security:
        - bearerAuth: []
        - basicAuth: []
      summary: Get form by key
      description: |-


        [[REQUIRED_PERMISSIONS:eyJwZXJtaXNzaW9ucyI6W3sicmVzb3VyY2VUeXBlIjoiUkVTT1VSQ0UiLCJwZXJtaXNzaW9uVHlwZSI6IlJFQUQifV19]]

        [[ADDED_IN_VERSION:8.10]]

        [[CONSISTENCY:EVENTUAL]]

        Get a form by its unique form key.
      parameters:
        - name: formKey
          in: path
          required: true
          description: The form key.
          schema:
            type: string
            format: string<FormKey>
            example: "2251799813684365"
            description: System-generated key for a deployed form.
      responses:
        "200":
          description: The form is successfully returned.
          content:
            application/json:
              schema:
                $ref: "form-models.yaml#/components/schemas/FormResult"
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "404":
          description: The form with the given key was not found.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"
      x-added-in-version: "8.10"
