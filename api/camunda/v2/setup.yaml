paths:
  /setup/user:
    post:
      tags:
        - Setup
      operationId: createAdminUser
      security: []
      summary: Create admin user
      description: |-


        [[ADDED_IN_VERSION:8.8]]

        [[REQUIRED_PERMISSIONS:eyJwZXJtaXNzaW9ucyI6W3siZHluYW1pYyI6dHJ1ZSwibm90ZSI6IkZpcnN0LWFkbWluIGJvb3RzdHJhcCDigJQgYWxsb3dlZCBhbm9ueW1vdXNseSB1bnRpbCBhbiBpbml0aWFsIGFkbWluIGV4aXN0czsgb3RoZXJ3aXNlIHJlcXVpcmVzIFVTRVIgQ1JFQVRFIGFuZCBST0xFIFVQREFURS4ifV19]]

        [[CONSISTENCY:STRONG]]

        Creates a new user and assigns the admin role to it. This endpoint is only usable when users are managed in the Orchestration Cluster and while no user is assigned to the admin role.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "users.yaml#/components/schemas/UserRequest"
        required: true
      responses:
        "201":
          description: The admin user was created successfully.
          content:
            application/json:
              schema:
                $ref: "users.yaml#/components/schemas/UserCreateResult"
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "409":
          description: A user with this username already exists.
          content:
            application/problem+json:
              schema:
                $ref: "problem-detail.yaml#/components/schemas/ProblemDetail"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"
        "503":
          $ref: "common-responses.yaml#/components/responses/ServiceUnavailable"
      x-added-in-version: "8.8"
