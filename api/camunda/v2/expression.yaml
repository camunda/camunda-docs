paths:
  /expression/evaluation:
    post:
      operationId: evaluateExpression
      security:
        - bearerAuth: []
        - basicAuth: []
      tags:
        - Expression
      summary: Evaluate an expression
      description: |-


        [[REQUIRED_PERMISSIONS:]]

        [[ADDED_IN_VERSION:8.9]]

        [[CONSISTENCY:STRONG]]

        Evaluates a FEEL expression and returns the result. Supports references to tenant scoped
        cluster variables when a tenant ID is provided. Optionally, provide a `scopeKey` to make the
        variables of a specific process instance or element instance visible while evaluating the
        expression.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpressionEvaluationRequest"
      responses:
        "200":
          description: Expression evaluated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpressionEvaluationResult"
        "400":
          $ref: "common-responses.yaml#/components/responses/InvalidData"
        "401":
          $ref: "common-responses.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common-responses.yaml#/components/responses/Forbidden"
        "500":
          $ref: "common-responses.yaml#/components/responses/InternalServerError"
      x-added-in-version: "8.9"
components:
  schemas:
    ExpressionEvaluationRequest:
      type: object
      required:
        - expression
      properties:
        expression:
          type: string
          description: The expression to evaluate (e.g., "=x + y")
          example: "=x + y"
        tenantId:
          type: string
          description: Required when the expression references tenant-scoped cluster variables
          example: tenant_123
        scopeKey:
          allOf:
            - $ref: "keys.yaml#/components/schemas/ScopeKey"
          description: |
            Key of the process instance or element instance whose variables should be made visible
            to the expression. Use a process instance key to evaluate against the process instance
            scope, or an element instance key to evaluate against that element instance scope. If
            omitted, the expression is evaluated unscoped, using only cluster variables
            and request-body variables.
        variables:
          type: object
          description: Optional variables for expression evaluation. These variables are only used for the current evaluation and do not persist beyond it.
          example:
            x: 10
            "y": 20
          additionalProperties: true
          nullable: true
      x-properties-added-in-version:
        - propertyName: scopeKey
          addedInVersion: "8.10"
    ExpressionEvaluationResult:
      type: object
      required:
        - expression
        - result
        - warnings
      properties:
        expression:
          type: string
          description: The evaluated expression
          example: "=x + y"
        result:
          description: The result value. Its type can vary.
          example: 30
          nullable: true
        warnings:
          type: array
          description: List of warnings generated during expression evaluation
          items:
            $ref: "#/components/schemas/ExpressionEvaluationWarningItem"
          example: []
    ExpressionEvaluationWarningItem:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: The warning message
          example: No function found with name 'random' and 1 parameters
