name: publish-prod

on:
  push:
    tags:
      - "8.3.[0-9]+"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: gcp-core-16-release
    container: node:24
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm ci
      - name: Enable Indexing
        run: "sed -i 's/noIndex: true/noIndex: false/g' docusaurus.config.js"
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          DOCS_SITE_URL: https://unsupported.docs.camunda.io
          DOCS_SITE_BASE_URL: /8.3/
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda-docs/ci/publish PROD_UNSUPPORTED_PATH;
            secret/data/products/camunda-docs/ci/publish HOST;
            secret/data/products/camunda-docs/ci/publish USER;
            secret/data/products/camunda-docs/ci/publish PRIVATE_KEY;
      - name: Publish
        uses: burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: build/
          remote_path: ${{ steps.secrets.outputs.PROD_UNSUPPORTED_PATH }}/8.3
          remote_host: ${{ steps.secrets.outputs.HOST }}
          remote_user: ${{ steps.secrets.outputs.USER }}
          remote_key: ${{ steps.secrets.outputs.PRIVATE_KEY }}
