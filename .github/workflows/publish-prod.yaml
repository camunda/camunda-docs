name: publish-prod

on:
  push:
    branches:
      - "update-publish-pipelines"
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "!0.25.[0-9]+"
      - "!0.26.[0-9]+"
      - "!1.0.[0-9]+"
      - "!1.1.[0-9]+"
      - "!1.2.[0-9]+"
      - "!1.3.[0-9]+"
      - "!8.0.[0-9]+"
      - "!8.1.[0-9]+"
      - "!8.2.[0-9]+"
      - "!8.3.[0-9]+"
      - "!8.4.[0-9]+"
      - "!8.5.[0-9]+"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: gcp-core-16-release
    container: node:24
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm ci
      - name: Enable Indexing
        run: "sed -i 's/noIndex: true/noIndex: false/g' docusaurus.config.js"
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          DOCS_SITE_URL: https://docs.camunda.io
          DOCS_SITE_BASE_URL: /
      - name: Add self-hosted GitHub runner IPs to security group so we can publish
        uses: docker://amazon/aws-cli:2.34.26
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        with:
          # PUBLISH_IPS needs to be in the form {CidrIp=XXX.XXX.XXX.XXX/32},{CidrIp=XXX.XXX.XXX.XXX/32} Ask infra for the list of IPs
          args: >
            ec2 authorize-security-group-ingress
            --group-id ${{ secrets.AWS_SECURITY_GROUP_NAME }}
            --ip-permissions IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[${{ secrets.PUBLISH_IPS }}]
            --output off
      - name: Publish
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: build/
          remote_path: ${{ secrets.AWS_PROD_PUBLISH_PATH }}
          remote_host: ${{ secrets.AWS_PROD_PUBLISH_HOST }}
          remote_user: ${{ secrets.AWS_PROD_PUBLISH_USER }}
          # vvvvv Intentionally missing the AWS_ prefix vvvvv
          remote_key: ${{ secrets.PUBLISH_PROD_KEY }}
      - name: Remove self-hosted GitHub runner IPs from security group
        uses: docker://amazon/aws-cli:2.34.26
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        with:
          # PUBLISH_IPS needs to be in the form {CidrIp=XXX.XXX.XXX.XXX/32},{CidrIp=XXX.XXX.XXX.XXX/32} Ask infra for the list of IPs
          args: >
            ec2 revoke-security-group-ingress
            --group-id ${{ secrets.AWS_SECURITY_GROUP_NAME }}
            --ip-permissions IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[${{ secrets.PUBLISH_IPS }}]
            --output off
        if: always()
  trigger-crawl:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger Algolia crawl
        uses: algolia/algoliasearch-crawler-github-actions@v1.1.13
        id: algolia_crawler
        with:
          crawler-user-id: ${{ secrets.ALGOLIA_CRAWLER_USER_ID }}
          crawler-api-key: ${{ secrets.ALGOLIA_CRAWLER_API_KEY }}
          algolia-app-id: ${{ secrets.ALGOLIA_APP_ID }}
          algolia-api-key: ${{ secrets.ALGOLIA_API_KEY }}
          site-url: "https://docs.camunda.io"
          crawler-name: ${{ secrets.ALGOLIA_CRAWLER_NAME }}
