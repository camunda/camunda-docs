name: publish-stage

on:
  push:
    branches:
      - "main"
    tags-ignore:
      - "*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: gcp-core-8-default
    container: node:24
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm ci
      - name: Cache Docusaurus
        uses: ./.github/actions/docusaurus-cache
      - name: Update redirects for environment
        run: "sed -i 's!https://unsupported.docs.camunda.io!https://stage.unsupported.docs.camunda.io!g' ./static/.htaccess"
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=8192
          DOCS_SITE_URL: https://stage.docs.camunda.io
          DOCS_SITE_BASE_URL: /
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda-docs/ci/publish STAGE_PATH;
            secret/data/products/camunda-docs/ci/publish HOST;
            secret/data/products/camunda-docs/ci/publish USER;
            secret/data/products/camunda-docs/ci/publish PRIVATE_KEY;
      - name: Publish
        uses: burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: build/
          remote_path: ${{ steps.secrets.outputs.STAGE_PATH }}
          remote_host: ${{ steps.secrets.outputs.HOST }}
          remote_user: ${{ steps.secrets.outputs.USER }}
          remote_key: ${{ steps.secrets.outputs.PRIVATE_KEY }}
  retry-shutdowns:
    # Because we run these jobs on preemptible runners, they can be shut down
    # automatically at any time. Instead of requiring a manual rerun every time
    # this happens, use the reusable action developed by the infra team to retry.
    runs-on: ubuntu-latest
    needs:
      - publish
    if: failure() && fromJSON(github.run_attempt) < 3
    steps:
      - name: Retry job
        uses: camunda/infra-global-github-actions/rerun-failed-run@main
        with:
          error-messages: |
            The runner has received a shutdown signal.
            The operation was canceled.
          run-id: ${{ github.run_id }}
          repository: ${{ github.repository }}
          vault-addr: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
  notify-failure:
    needs:
      - publish
    if: failure() || (success() && fromJSON(github.run_attempt) > 1)
    uses: ./.github/workflows/notify-failure.yml
    with:
      dependency_status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
      VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
