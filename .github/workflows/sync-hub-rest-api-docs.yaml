name: Sync Camunda Hub REST API

on:
  schedule:
    - cron: "0 15 * * 4" # Runs every Thursday at 3 PM UTC
  push:
    branches:
      - "hub-api-sync"
  workflow_dispatch:

jobs:
  sync-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Camunda docs repository
        uses: actions/checkout@v6
        with:
          repository: camunda/camunda-docs
          path: docs

      - name: Check for stable branch
        id: compute_branch
        run: |
          # During development of a minor release, engineers push changes to the camunda hub repo's main branch, so we use main during this time to keep the docs up to date
          # with the alpha releases. However, toward the end of the dev cycle for the minor version, engineers cut a stable version branch in the form stable/8.x and 
          # start including code for the next version in main. At this point, we need to stop using main and switch to the stable branch until the minor version ships. 
          # After that, we need to switch back to using main.

          # This step in the workflow uses the docs repo's latest release tag to compute the next expected stable branch. If such a branch exists, we use it.
          # Otherwise, we use main.

          # Get the latest docs tag, and increment the minor version to store the next minor release.
          cd docs
          next_minor_release=$(
            git ls-remote --tags origin '*.*.*'  \
                | awk '{print $2}' \
                | sed 's#refs/tags/##' \
                | sort -V \
                | tail -n1 \
                | awk -F. '{printf "%d.%d", $1, $2+1}'
          )

          # If a stable camunda hub branch exists for the next minor release, use it. Otherwise, use main.
          stable_branch="stable/$next_minor_release"
          if git ls-remote --exit-code --heads https://github.com/camunda/camunda-hub $stable_branch; then
            echo "Found a stable branch: $stable_branch"
            echo "camunda_hub_branch=$stable_branch" >> "$GITHUB_OUTPUT"
          else
            echo "No stable branch for version $next_minor_release, using main"
            echo "camunda_hub_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Camunda Hub
        uses: actions/checkout@v6
        with:
          repository: camunda/camunda-hub
          path: rest-spec
          ref: ${{ steps.compute_branch.outputs.camunda_hub_branch }}
          sparse-checkout: restapi/public-api/src/main/resources/openapi/v2
          sparse-checkout-cone-mode: false

      - name: Sync next version documentation
        run: |
          cd docs
          mv ../rest-spec/restapi/public-api/src/main/resources/openapi/v2/* api/hub/v2
          cd api/hub/v2
          mv rest-api.yaml camunda-openapi.yaml
          npm i
          npm run api:generate:hub

      - name: Check for changes
        id: check_changes
        run: |
          cd docs
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate token
        if: steps.check_changes.outputs.has_changes == 'true'
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_API_SYNC_ID }}
          private-key: ${{ secrets.GH_APP_API_SYNC_KEY }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: "${{ steps.generate_token.outputs.token }}"
          path: docs
          title: Update Camunda Hub REST API docs
          body: |
            ## Description

            This is an autogenerated PR by the [sync-hub-rest-api-docs workflow](https://github.com/camunda/camunda-docs/tree/main/.github/workflows/sync-hub-rest-api-docs.yaml).
            This includes changes from the next camunda hub version (`main` branch).
            This PR contains also all the generated OpenAPI files related to the changes.

            ## When should this change go live?

            - There is **no urgency** with this change and can be released at any time.

            ## PR Checklist

            - My changes are for the **next minor** and are in `/docs` directory (aka `/next/`).
            - My changes require a [technical writer review](https://github.com/camunda/camunda-docs/blob/main/howtos/documentation-guidelines.md#review-process), and I've assigned @camunda/tech-writers as a reviewer.

          commit-message: "docs: update Camunda Hub REST API spec"
          branch: update-hub-rest-doc
          delete-branch: true
          team-reviewers: camunda/tech-writers
          base: main
          labels: deploy
