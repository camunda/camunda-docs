name: Check external links

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/links.yml"
      - "lychee-external-links.toml"
  schedule:
    - cron: "0 3 1 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: links-check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Get Current Date
        id: dateofday
        run: echo "DATEOFDAY=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Restore lychee cache
        id: cache-restore
        uses: actions/cache/restore@v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ env.DATEOFDAY }}
          restore-keys: |
            cache-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.8.0
        id: link-checker
        with:
          fail: false
          failIfEmpty: false
          args: --config ./lychee-external-links.toml --no-progress 'docs/**/*.md' 'versioned_docs/**/*.md'
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ env.DATEOFDAY }}

      - name: Fail if checker failed in non-schedule trigger mode
        if: github.event_name != 'schedule' && steps.link-checker.outputs.exit_code != 0
        run: |
          echo "Link checker failed with exit code ${{ steps.link-checker.outputs.exit_code }}"
          exit 1

      - name: Create Issue From File
        if: ${{ failure() && github.event_name == 'schedule' && steps.link-checker.outputs.exit_code != 0 }}
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue, kind/bug, dx
  notify-failure:
    name: Send message to Slack on failure
    runs-on: ubuntu-latest
    needs:
      - lint
    if: failure()
    steps:
      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda-docs/ci/slack DOCS_NOTIFICATION_WEBHOOK_URL;
      - id: slack
        uses: slackapi/slack-github-action@e090a7a7c0b2d9b7ae32bd34f086e680ce260b06
        with:
          webhook: ${{ steps.secrets.outputs.DOCS_NOTIFICATION_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload-templated: true
          payload: |
            {
              "github_server_url": "${{ github.server_url }}",
              "github_repo": "${{ github.repository }}",
              "github_run_id": "${{ github.run_id }}",
              "github_ref_name": "${{ github.ref_name }}",
              "github_workflow": "${{ github.workflow }}"
            }
