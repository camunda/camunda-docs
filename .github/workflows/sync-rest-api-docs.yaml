name: Sync Camunda REST API

on:
  pull_request:
  schedule:
    - cron: "0 15 * * 4" # Runs every Thursday at 3 PM UTC
  workflow_dispatch:

jobs:
  sync-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Camunda docs repository
        uses: actions/checkout@v6
        with:
          repository: camunda/camunda-docs
          path: docs

      - name: Check for stable
        id: compute_branch
        run: |
          # Get the latest docs tag, and increment the minor version
          # to store the next minor release.
          cd docs
          next_minor_release=$(
            git ls-remote --tags origin \
                | awk '{print $2}' \
                | sed 's#refs/tags/##' \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V \
                | tail -n1 \
                | awk -F. '{printf "%d.%d", $1, $2+1}'
          )

          # If a stable camunda branch exists for the
          # next minor release, use it. Otherwise, use main.
          stable_branch="stable/$next_minor_release"
          if git ls-remote --heads https://github.com/camunda/camunda $stable_branch; then
            echo "Found a stable branch: origin/$stable_branch"
            echo "camunda_branch=$stable_branch" >> "$GITHUB_OUTPUT"
          else
            echo "No stable branch for version $next_minor_release, using main"
            echo "camunda_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Camunda
        uses: actions/checkout@v6
        with:
          repository: camunda/camunda
          path: rest-spec
          ref: ${{ steps.compute_branch.outputs.camunda_branch }}
          sparse-checkout: zeebe/gateway-protocol/src/main/proto/v2
          sparse-checkout-cone-mode: false

      - name: Sync documentation
        run: |
          # Copy the rest specs to the docs repo, and generate the docs.
          cd docs
          mv ../rest-spec/zeebe/gateway-protocol/src/main/proto/v2/* api/camunda/v2
          cd api/camunda/v2
          mv rest-api.yaml camunda-openapi.yaml
          npm i
          npm run api:generate:camunda
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
            exit 0
          fi

