name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request_review_comment' &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub token
        id: github-token
        uses: camunda/infra-global-github-actions/generate-github-app-token-from-vault-secrets@main
        with:
          github-app-id-vault-key: APP_ID
          github-app-id-vault-path: secret/data/products/camunda-docs/github/apps/camunda-docs-pr-automation
          github-app-private-key-vault-key: APP_PRIVATE_KEY
          github-app-private-key-vault-path: secret/data/products/camunda-docs/github/apps/camunda-docs-pr-automation
          vault-auth-method: approle
          vault-auth-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-auth-secret-id: ${{ secrets.VAULT_SECRET_ID }}
          vault-url: ${{ secrets.VAULT_ADDR }}

      # TODO: confirm Vault path once ANTHROPIC_API_KEY is stored in Vault
      - name: Import secrets from Vault
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda-docs/ci/claude-reviewer ANTHROPIC_API_KEY;

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ steps.secrets.outputs.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.github-token.outputs.token }}
          direct_prompt: |
            Review this pull request against the Camunda docs contribution standards referenced from AGENTS.md.

            Post inline comments for issues found, with a concrete fix suggestion for each.
