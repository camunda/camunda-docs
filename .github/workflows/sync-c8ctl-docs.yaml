name: Sync c8ctl CLI documentation

on:
  schedule:
    - cron: "30 16 * * 4" # Runs every Thursday at 4:30 PM UTC (30 min after TS SDK sync)
  workflow_dispatch:
    inputs:
      docs_version:
        description: "Docs version to update (e.g. '8.8'). Leave empty for next (docs/)."
        required: false
        default: ""
      c8ctl_ref:
        description: "Git ref of the c8ctl repo. Ignored when docs_version is set (uses stable/<version>)."
        required: false
        default: "main"
      dry_run:
        description: "Dry run — generate docs but skip PR creation"
        required: false
        type: boolean
        default: false

jobs:
  sync-c8ctl-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve refs and paths
        id: resolve
        run: |
          VERSION="${{ github.event.inputs.docs_version }}"
          if [ -n "$VERSION" ]; then
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
              echo "::error::docs_version must be in X.Y format (e.g. '8.9'), got: '$VERSION'"
              exit 1
            fi
            echo "c8ctl_ref=stable/${VERSION#*.}" >> "$GITHUB_OUTPUT"
            echo "docs_root=versioned_docs/version-${VERSION}" >> "$GITHUB_OUTPUT"
            echo "pr_branch=update-c8ctl-docs/${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version_label=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "c8ctl_ref=${{ github.event.inputs.c8ctl_ref || 'main' }}" >> "$GITHUB_OUTPUT"
            echo "docs_root=docs" >> "$GITHUB_OUTPUT"
            echo "pr_branch=update-c8ctl-docs" >> "$GITHUB_OUTPUT"
            echo "version_label=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout camunda-docs
        uses: actions/checkout@v7
        with:
          repository: camunda/camunda-docs
          path: docs

      - name: Checkout c8ctl
        uses: actions/checkout@v7
        with:
          repository: camunda/c8ctl
          ref: ${{ steps.resolve.outputs.c8ctl_ref }}
          path: c8ctl

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install c8ctl dependencies
        working-directory: c8ctl
        run: npm ci

      - name: Generate command reference
        working-directory: c8ctl
        run: npm run sync:docs

      - name: Copy c8ctl docs into camunda-docs
        run: |
          TARGET="docs/${{ steps.resolve.outputs.docs_root }}/apis-tools/c8ctl"
          mkdir -p "$TARGET"
          # Explicit allowlist of pages synced from the c8ctl repo (source of truth).
          # Repo-only docs in c8ctl/docs (e.g. plugin-collisions.md) are intentionally NOT listed.
          SYNCED_FILES="getting-started.md cluster-inspection.md identity-management.md development-workflows.md plugins.md command-reference.md sidebar-schema.js"
          for f in $SYNCED_FILES; do
            if [ -f "c8ctl/docs/$f" ]; then
              cp "c8ctl/docs/$f" "$TARGET/$f"
              echo "Copied $f → $TARGET/"
            elif [ -f "$TARGET/$f" ]; then
              # The page is no longer present on the selected c8ctl ref — remove the
              # stale copy so removed pages don't linger in camunda-docs.
              # NOTE: removing a published page also needs a redirect in
              # static/.htaccess. The workflow cannot generate that reliably, so
              # whoever reviews the resulting sync PR must add the redirect manually.
              rm "$TARGET/$f"
              echo "Removed stale $f (no longer present on this c8ctl ref)"
            else
              echo "Skipped $f (not present on this c8ctl ref)"
            fi
          done

      - name: Check for changes
        id: check_changes
        working-directory: docs
        run: |
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Secrets
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          exportEnv: false
          secrets: |
            secret/data/products/camunda-docs/github/apps/camunda-docs-pr-automation APP_ID;
            secret/data/products/camunda-docs/github/apps/camunda-docs-pr-automation APP_PRIVATE_KEY;

      - name: Generate token
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: "${{ steps.generate_token.outputs.token }}"
          path: docs
          title: "docs: sync c8ctl CLI documentation (${{ steps.resolve.outputs.version_label }})"
          body: |
            ## Description

            Auto-generated PR from the [sync c8ctl docs workflow](https://github.com/camunda/camunda-docs/tree/main/.github/workflows/sync-c8ctl-docs.yaml).

            Syncs the c8ctl CLI documentation from [`c8ctl@${{ steps.resolve.outputs.c8ctl_ref }}`](https://github.com/camunda/c8ctl/tree/${{ steps.resolve.outputs.c8ctl_ref }}), which is the single source of truth for these pages.

            **Target:** `${{ steps.resolve.outputs.docs_root }}/apis-tools/c8ctl/`

            > These pages are maintained in the c8ctl repo. Do not edit them here — edit the source in c8ctl and let this workflow sync the changes.

            ## When should this change go live?

            - There is **no urgency** with this change and can be released at any time.

            ## PR Checklist

            - My changes are in `/${{ steps.resolve.outputs.docs_root }}`.
          commit-message: "docs: sync c8ctl CLI documentation (${{ steps.resolve.outputs.version_label }})"
          branch: ${{ steps.resolve.outputs.pr_branch }}
          delete-branch: true
          base: main
          labels: deploy
  notify-failure:
    needs:
      - sync-c8ctl-docs
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    secrets:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
      VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
