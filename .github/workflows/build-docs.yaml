name: build-docs

on: pull_request

jobs:
  build-docs:
    runs-on: gcp-core-16-default
    container: node:24
    steps:
      - uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      # Removed because it's causing build issues
      # - name: Cache Docusaurus
      #   uses: ./.github/actions/docusaurus-cache
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=30720
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: build
          include-hidden-files: true

  validate-links:
    runs-on: gcp-core-16-default
    needs: build-docs
    env:
      temporary_link_path: .github/workflows/validate-links
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: build
      - name: Install hyperlink
        run: npm install -g @untitaker/hyperlink
      - name: Check internal links
        uses: untitaker/hyperlink@0.2.0
        with:
          args: build/
      - name: Remove https redirect
        run: |
          sed -i '/SERVER_PORT/d;/SERVER_NAME/d' build/.htaccess
      - name: Run a web server for link checking
        run: |
          docker run -d --name webserver -v "$PWD/build":/app -p 8888:8080 bitnamilegacy/apache:2.4.54
          container_ip=$(docker inspect -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' webserver)
          echo "container_ip=${container_ip}" >> $GITHUB_ENV
          echo "domain_to_test=http://${container_ip}:8080" >> $GITHUB_ENV
      - name: Wait for running docs web server
        uses: nev7n/wait_for_response@v1
        with:
          url: ${{ env.domain_to_test }}
      - name: Download sitemap from production
        run: curl -sL https://docs.camunda.io/sitemap.xml | grep -oP '<loc>\K.*?(?=</loc>)' > sitemap.prod.txt
      - name: Remove known broken anchors.
        run: |
          sed -i 's!power-automate/#oauth-token-endpoint!power-automate/!g' connectors-element-template-links.txt
      - name: Prepare link collections
        # Turn static lists of URLs into HTML files with anchor tags.
        run: |
          mkdir -p ${temporary_link_path}
          sed "s!https://docs\.camunda\.io\(.*\)!<a href=\"${domain_to_test}\1\">link</a>!g" \
            sitemap.prod.txt \
            > ${temporary_link_path}/sitemap-prod.html
          sed "s!https://docs\.camunda\.io\(.*\)!<a href=\"${domain_to_test}\1\">link</a>!g" \
            product-links.txt \
            > ${temporary_link_path}/product-links.html
          sed "s!https://docs\.camunda\.io\(.*\)!<a href=\"${domain_to_test}\1\">link</a>!g" \
            connectors-element-template-links.txt \
            > ${temporary_link_path}/connectors-element-template-links.html
      - name: Serve link collections
        ## Run another web server because Muffet only works against web pages, not source files.
        uses: Eun/http-server-action@v1
        with:
          directory: ${{ env.temporary_link_path }}
          port: 8081
      - name: Validate sitemap links
        uses: ./.github/actions/muffet
        with:
          url_to_validate: http://localhost:8081/sitemap-prod.html
      - name: Validate product links
        uses: ./.github/actions/muffet
        with:
          url_to_validate: http://localhost:8081/product-links.html
      - name: Validate element template links
        uses: ./.github/actions/muffet
        with:
          url_to_validate: http://localhost:8081/connectors-element-template-links.html

  deploy-preview:
    # If the 'deploy' label is applied to an open PR, deploy the artifacts
    # to the preview environment. In this job, we reuse the build from the
    # build-docs job to avoid unnecessary rebuilds.
    name: deploy-preview-env
    runs-on: ubuntu-24.04
    needs: build-docs
    if: >
      github.event.pull_request.state != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'deploy')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Import secrets from Vault
        id: secrets
        uses: hashicorp/vault-action@79632e33d6953d190b940ffa440bf97821cabd80
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            secret/data/products/camunda-docs/ci/preview-environment PREVIEW_ENV_BUCKET_NAME;
            secret/data/products/camunda-docs/ci/preview-environment PREVIEW_ENV_GCLOUD_SA_KEY;

      - name: Upsert comment with build status
        uses: mshick/add-pr-comment@v3
        with:
          refresh-message-position: true
          message: |
            :construction: The preview environment for the commit ${{ github.sha }} is being built. This usually takes 8-10 minutes.

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: docs-build
          path: build

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ steps.secrets.outputs.PREVIEW_ENV_GCLOUD_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Start Deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ github.token }}
          env: ${{ github.event.repository.name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Update comment with upload status
        uses: mshick/add-pr-comment@v3
        with:
          refresh-message-position: true
          message: |
            :arrow_up: The preview environment build results for commit ${{ github.sha }} are being uploaded. This usually takes 3-4 minutes.

      - name: Upload files to Google bucket
        env:
          BUCKET_NAME: ${{ steps.secrets.outputs.PREVIEW_ENV_BUCKET_NAME }}
        run: |
          gsutil -m rsync -d -r build gs://$BUCKET_NAME/pr-${{ github.event.number }}

      - uses: bobheadxi/deployments@v1
        with:
          step: finish
          token: ${{ github.token }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
          env_url: https://${{ steps.secrets.outputs.PREVIEW_ENV_BUCKET_NAME }}/pr-${{ github.event.number }}/index.html

      - name: Update comment with deployment status
        uses: mshick/add-pr-comment@v3
        env:
          BUCKET_NAME: ${{ steps.secrets.outputs.PREVIEW_ENV_BUCKET_NAME }}
        with:
          refresh-message-position: true
          message: |
            The preview environment relating to the commit ${{ github.sha }} has successfully been deployed. You can access it at [https://${{ env.BUCKET_NAME }}/pr-${{ github.event.number }}/](https://${{ env.BUCKET_NAME }}/pr-${{ github.event.number }}/)

  retry-shutdowns:
    # Because we run these jobs on preemptible runners, they can be shut down
    # automatically at any time. Instead of requiring a manual rerun every time
    # this happens, use the reusable action developed by the infra team to retry.
    runs-on: ubuntu-latest
    needs:
      - build-docs
      - validate-links
    if: failure() && fromJSON(github.run_attempt) < 3
    steps:
      - name: Retry job
        uses: camunda/infra-global-github-actions/rerun-failed-run@main
        with:
          error-messages: |
            The runner has received a shutdown signal.
            The operation was canceled.
          run-id: ${{ github.run_id }}
          repository: ${{ github.repository }}
          vault-addr: ${{ secrets.VAULT_ADDR }}
          vault-role-id: ${{ secrets.VAULT_ROLE_ID }}
          vault-secret-id: ${{ secrets.VAULT_SECRET_ID }}
