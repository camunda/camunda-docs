StylesPath = "styles/camunda"

[{docs,versioned_docs}/**/*.{md,mdx}]
BasedOnStyles = all

# Generated SDK API reference — language/terminology rules are relaxed
# because the content originates from upstream OpenAPI specifications
# and SDK-generated code that we do not control.
# Link rules remain active so broken or non-relative URLs are caught.
[{docs,versioned_docs}/**/apis-tools/typescript/api-reference/**/*.md]
all.americanBritish = NO
all.inclusiveLanguage = NO
all.glossary = NO

[{docs,versioned_docs}/**/apis-tools/python-sdk/**/*.md]
all.americanBritish = NO
all.inclusiveLanguage = NO
all.glossary = NO

[{docs,versioned_docs}/**/apis-tools/csharp-sdk/**/*.md]
all.americanBritish = NO
all.inclusiveLanguage = NO
all.glossary = NO

# Migration redirect stub for Camunda 8.10 (next): the Bitnami migration guide
# only exists in the published 8.9 docs, so this page intentionally links to the
# version-pinned production URL (docs.camunda.io/docs/8.9/...) to stay accurate
# after 8.10 becomes the current version.
[docs/self-managed/deployment/helm/operational-tasks/migration-from-bitnami/index.md]
all.markdownLinksDontExitToProduction = NO
